<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Create User</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3 d-flex justify-content-between">
    <span class="navbar-text text-white">
        <b sec:authentication="name"></b>
        with roles
        <span sec:authentication="authorities"></span>
    </span>

    <form th:action="@{/logout}" method="post" class="m-0">
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}"/>
        <button class="btn btn-link text-white p-0">Logout</button>
    </form>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-2 bg-white border-end vh-100 pt-3">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link active bg-primary text-white" th:href="@{/admin}">
                        Admin
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/user}">
                        User
                    </a>
                </li>
            </ul>
        </div>

        <!-- CONTENT -->
        <div class="col-10 p-4">

            <h2>Create new user</h2>

            <!-- TABS -->
            <ul class="nav nav-tabs mb-3">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin}">
                        All Users
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/admin/new}">
                        Add New User
                    </a>
                </li>
            </ul>

            <!-- CENTERED FORM -->
            <div class="row justify-content-center">
                <div class="col-6">

                    <div class="card">
                        <div class="card-header">
                            Add new user
                        </div>

                        <div class="card-body">

                            <form th:action="@{/admin}" th:object="${user}" method="post">

                                <!-- USERNAME -->
                                <div class="mb-3">
                                    <label class="form-label">Username</label>
                                    <input class="form-control"
                                           th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                                           type="text" th:field="*{username}"/>
                                    <div class="invalid-feedback" th:errors="*{username}"></div>
                                </div>

                                <!-- PASSWORD -->
                                <div class="mb-3">
                                    <label class="form-label">Password</label>
                                    <input class="form-control"
                                           th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                                           type="password" th:field="*{password}"/>
                                    <div class="invalid-feedback" th:errors="*{password}"></div>
                                </div>

                                <!-- EMAIL -->
                                <div class="mb-3">
                                    <label class="form-label">Email</label>
                                    <input class="form-control"
                                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                           type="email" th:field="*{email}"/>
                                    <div class="invalid-feedback" th:errors="*{email}"></div>
                                </div>

                                <!-- NAME -->
                                <div class="mb-3">
                                    <label class="form-label">Name</label>
                                    <input class="form-control"
                                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                                           type="text" th:field="*{name}"/>
                                    <div class="invalid-feedback" th:errors="*{name}"></div>
                                </div>

                                <!-- SURNAME -->
                                <div class="mb-3">
                                    <label class="form-label">Surname</label>
                                    <input class="form-control"
                                           th:classappend="${#fields.hasErrors('surname')} ? 'is-invalid'"
                                           type="text" th:field="*{surname}"/>
                                    <div class="invalid-feedback" th:errors="*{surname}"></div>
                                </div>

                                <!-- AGE -->
                                <div class="mb-3">
                                    <label class="form-label">Age</label>
                                    <input class="form-control"
                                           th:classappend="${#fields.hasErrors('age')} ? 'is-invalid'"
                                           type="number" th:field="*{age}"/>
                                    <div class="invalid-feedback" th:errors="*{age}"></div>
                                </div>

                                <!-- ROLES -->
                                <div class="mb-3">
                                    <label class="form-label">Roles</label>

                                    <div th:each="role : ${rolesList}" class="form-check">
                                        <input class="form-check-input"
                                               type="checkbox"
                                               name="rolesSelected"
                                               th:value="${role.name}"/>
                                        <label class="form-check-label"
                                               th:text="${role.name}"></label>
                                    </div>

                                    <div class="text-danger mt-1"
                                         th:errors="*{roles}"></div>
                                </div>

                                <!-- BUTTON -->
                                <button class="btn btn-success w-100" type="submit">
                                    Create user
                                </button>

                            </form>

                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
