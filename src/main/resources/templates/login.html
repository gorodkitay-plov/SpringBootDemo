<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f5f7fa;
    }

    .form-signin {
      max-width: 330px;
      padding: 15px;
      margin: 80px auto;
    }

    .form-signin .form-control,
    .form-signin .btn {
      height: 34px;
      font-size: 14px;
      border-radius: 6px;
    }

    .form-signin .form-control::placeholder {
      color: #adb5bd;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<div class="form-signin text-center">

  <form th:action="@{/login}" method="post">

    <h1 class="h5 mb-3 fw-normal">Sign in</h1>

    <!-- CSRF -->
    <input type="hidden"
           th:name="${_csrf.parameterName}"
           th:value="${_csrf.token}"/>

    <!-- USERNAME -->
    <input type="text"
           name="username"
           class="form-control mb-2"
           placeholder="Username"
           required autofocus>

    <!-- PASSWORD -->
    <input type="password"
           name="password"
           class="form-control mb-3"
           placeholder="Password"
           required>

    <!-- ERROR -->
    <div th:if="${param.error}" class="text-danger mb-2">
      Invalid username or password
    </div>

    <!-- LOGOUT MESSAGE -->
    <div th:if="${param.logout}" class="text-success mb-2">
      You have been logged out
    </div>

    <!-- BUTTON -->
    <button class="btn btn-primary w-100" type="submit">
      Sign in
    </button>

  </form>

</div>

</body>
</html>
