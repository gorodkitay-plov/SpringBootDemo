<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit User</title>
</head>
<body>

<h2>Edit User</h2>

<form th:action="@{/admin/{id}(id=${user.id})}" th:object="${user}" method="post">
    <input type="hidden" name="_method" value="patch"/>

    <table>
        <tr>
            <td>Username:</td>
            <td><input type="text" th:field="*{username}"/></td>
        </tr>
        <tr>
            <td>Password:</td>
            <td>
                <input type="password" th:field="*{password}" placeholder="Leave empty to keep"/>
            </td>
        </tr>
        <tr>
            <td>Name:</td>
            <td><input type="text" th:field="*{name}"/></td>
        </tr>
        <tr>
            <td>Surname:</td>
            <td><input type="text" th:field="*{surname}"/></td>
        </tr>
        <tr>
            <td>Email:</td>
            <td><input type="email" th:field="*{email}"/></td>
        </tr>
        <tr>
            <td>Age:</td>
            <td><input type="number" th:field="*{age}"/></td>
        </tr>
        <tr>
            <td>Roles:</td>
            <td>
                <div th:each="role : ${rolesList}">
                    <label>
                        <input type="checkbox"
                               name="rolesSelected"
                               th:value="${role.name}"
                               th:checked="${user.roles != null and user.roles.contains(role)}">
                        <span th:text="${role.name}"></span>
                    </label><br/>
                </div>

                <!-- ошибка -->
                <div th:if="${#fields.hasErrors('roles')}"
                     th:errors="*{roles}"></div>
            </td>
        </tr>
    </table>

    <br/>
    <button type="submit">Update</button>
</form>

<br/>
<a th:href="@{/admin}">Back</a>

</body>
</html>
