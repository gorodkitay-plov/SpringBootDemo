<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>User Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .sidebar {
            height: 100vh;
            background-color: #fff;
            border-right: 1px solid #dee2e6;
        }

        .sidebar .nav-link {
            display: block;
            width: 100%;
            color: #000;
            padding: 12px 20px;
        }

        .sidebar .nav-link.active {
            background-color: #0d6efd;
            color: #fff;
        }
    </style>
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3 d-flex justify-content-between">

    <span class="navbar-text text-white">
        <b sec:authentication="name"></b> with roles
        <span sec:authentication="authorities"></span>
    </span>

    <form th:action="@{/logout}" method="post">
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}"/>
        <button class="btn btn-link text-white">Logout</button>
    </form>

</nav>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-2 sidebar p-0">
            <ul class="nav flex-column">

                <!-- ADMIN -->
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin}">
                        Admin
                    </a>
                </li>

                <!-- USER -->
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/user}">
                        User
                    </a>
                </li>

            </ul>
        </div>

        <!-- CONTENT -->
        <div class="col-10 p-4">

            <h2>User Panel</h2>

            <div class="card">
                <div class="card-header">
                    User information
                </div>

                <div class="card-body">

                    <table class="table table-striped">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Name</th>
                            <th>Surname</th>
                            <th>Age</th>
                            <th>Email</th>
                            <th>Roles</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr>
                            <td th:text="${user.id}"></td>
                            <td th:text="${user.username}"></td>
                            <td th:text="${user.name}"></td>
                            <td th:text="${user.surname}"></td>
                            <td th:text="${user.age}"></td>
                            <td th:text="${user.email}"></td>

                            <td>
                                <span th:each="role : ${user.roles}"
                                      th:text="${role.name} + ' '"></span>
                            </td>
                        </tr>
                        </tbody>
                    </table>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
